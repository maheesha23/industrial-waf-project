worker_processes auto;

error_log /var/log/modsecurity/error.log info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format waf_json '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log waf_json;
    sendfile on;
    keepalive_timeout 65;

    upstream juice_shop_backend {
        server juice-shop:3000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        modsecurity on;
        modsecurity_rules '
            SecRuleEngine On;
            SecRequestBodyAccess On;
            SecResponseBodyAccess Off;
            SecAuditEngine RelevantOnly;
            SecAuditLogType Serial;
            SecAuditLogFormat JSON;
            SecAuditLog /var/log/modsecurity/audit.log;
            SecAction "id:900110,phase:1,pass,nolog,ctl:paranoiaLevel=2";
        ';

        location / {
            proxy_pass http://juice_shop_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}