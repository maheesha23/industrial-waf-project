server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /var/lib/promtail/positions.yaml
clients:
- url: http://loki:3100/loki/api/v1/push
scrape_configs:
- job_name: modsecurity
  static_configs:
  - targets:
    - localhost
    labels:
      job: modsecurity
      app: waf
      __path__: /var/log/modsecurity/audit.log
  pipeline_stages:
  - json:
      expressions:
        client_ip: transaction.client_ip
        uri: transaction.request.uri
        status: transaction.response.http_code
        is_interrupted: transaction.is_interrupted
        rid0: transaction.messages[0].details.ruleId
        messages_raw: transaction.messages
  - template:
      source: event_type
      template: '{{ if eq .is_interrupted "true" }}blocked{{ else }}allowed{{ end }}'
  - template:
      source: attack_type
      template: '{{ if contains "\"ruleId\":\"942" .messages_raw }}SQL Injection{{ else if contains "\"ruleId\":\"941" .messages_raw }}XSS{{ else if contains "\"ruleId\":\"930" .messages_raw }}Path Traversal{{ else if contains "\"ruleId\":\"931" .messages_raw }}RFI{{ else if or (contains "\"ruleId\":\"932" .messages_raw) (contains "\"ruleId\":\"933" .messages_raw) }}RCE{{ else if contains "\"ruleId\":\"920" .messages_raw }}Protocol Violation{{ else if contains "\"ruleId\":\"913" .messages_raw }}Scanner Activity{{ else if eq .rid0 "949110" }}Unclassified (Score Only){{ else if .rid0 }}Unknown Attack{{ else }}Unknown Attack{{ end }}'
  - labels:
      status:
      rule_id:
      event_type:
      attack_type:
- job_name: waf-access
  static_configs:
  - targets:
    - localhost
    labels:
      job: waf-access
      app: waf
      __path__: /var/log/nginx/access.log
  pipeline_stages:
  - regex:
      expression: '^(?P<client_ip>\S+) \S+ \S+ \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<uri>\S+) \S+" (?P<status>\d{3}) (?P<body_bytes_sent>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'
  - labels:
      status:
